<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seattle Economic Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="logo">Seattle Econ</span>
    </div>
    <input type="text" id="global-search" placeholder="Search metrics..." autocomplete="off">
    <nav>
      <ul>
        <li><a href="#today" class="nav-link active" data-section="today">Today</a></li>
        <li><a href="#housing" class="nav-link" data-section="housing">Housing</a></li>
        <li><a href="#inflation" class="nav-link" data-section="inflation">Inflation</a></li>
        <li><a href="#employment" class="nav-link" data-section="employment">Employment</a></li>
        <li><a href="#fed" class="nav-link" data-section="fed">Fed</a></li>
        <li><a href="#upcoming" class="nav-link" data-section="upcoming">Upcoming</a></li>
        <li><a href="#recent" class="nav-link" data-section="recent">Recent Releases</a></li>
        <li class="divider"></li>
        <li><a href="#flagged" class="nav-link" data-section="flagged">Flagged</a></li>
        <li><a href="#alldata" class="nav-link" data-section="alldata">All Data</a></li>
        <li><a href="#help" class="nav-link" data-section="help">Help / Sources</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <label>Databricks Workspace URL
        <input type="text" id="db-workspace-input" placeholder="https://xyz.cloud.databricks.com">
      </label>
      <label>Serving Endpoint Name
        <input type="text" id="db-endpoint-input" placeholder="e.g. claude-haiku">
      </label>
      <label>Databricks Token
        <input type="password" id="api-key-input" placeholder="dapi...">
      </label>
      <button id="save-key-btn">Save</button>
      <div id="db-status" style="font-size:0.7rem;margin-top:6px;color:var(--text-muted)"></div>
    </div>
  </aside>

  <main id="main-content">
    <!-- Sections rendered by JS -->
  </main>

  <div id="search-results" class="search-dropdown hidden"></div>

  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
