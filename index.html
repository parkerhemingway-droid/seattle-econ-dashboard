<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seattle Economic Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo-img-wrap">
        <img src="images/research-logo.png" alt="Market Research" class="logo-img">
      </div>
      <span class="logo-sub">Seattle · Greater MSA</span>
    </div>
    <input type="text" id="global-search" placeholder="Search metrics..." autocomplete="off">

    <div class="zip-search-wrap">
      <span class="zip-search-label">Zip Code Drill-down</span>
      <div class="zip-search-row">
        <input type="text" id="zip-input" placeholder="e.g. 98103" maxlength="5" inputmode="numeric">
        <button id="zip-go-btn">Go</button>
      </div>
      <div class="zip-suggestions" id="zip-chips"></div>
    </div>

    <nav>
      <ul>
        <li><a href="#today" class="nav-link active" data-section="today">Today</a></li>
        <li><a href="#housing" class="nav-link" data-section="housing">Housing</a></li>
        <li><a href="#luxury" class="nav-link" data-section="luxury">Luxury $3M+</a></li>
        <li><a href="#inflation" class="nav-link" data-section="inflation">Inflation</a></li>
        <li><a href="#employment" class="nav-link" data-section="employment">Employment</a></li>
        <li><a href="#fed" class="nav-link" data-section="fed">Fed</a></li>
        <li><a href="#upcoming" class="nav-link" data-section="upcoming">Upcoming</a></li>
        <li><a href="#recent" class="nav-link" data-section="recent">Recent Releases</a></li>
        <li class="divider"></li>
        <li><a href="#flagged" class="nav-link" data-section="flagged">Flagged</a></li>
        <li><a href="#alldata" class="nav-link" data-section="alldata">All Data</a></li>
        <li><a href="#help" class="nav-link" data-section="help">Help / Sources</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <label>Databricks Workspace URL
        <input type="text" id="db-workspace-input" placeholder="https://xyz.cloud.databricks.com">
      </label>
      <label>Serving Endpoint Name
        <input type="text" id="db-endpoint-input" placeholder="e.g. claude-haiku">
      </label>
      <label>Databricks Token
        <input type="password" id="api-key-input" placeholder="dapi...">
      </label>
      <button id="save-key-btn">Save</button>
      <div id="db-status" style="font-size:0.7rem;margin-top:6px;color:var(--text-muted)"></div>
    </div>
  </aside>

  <main id="main-content">
    <!-- Sections rendered by JS -->
  </main>

  <div id="search-results" class="search-dropdown hidden"></div>

  <!-- Metric expand modal -->
  <div id="metric-modal-overlay">
    <div id="metric-modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-meta" id="modal-meta"></div>
        </div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats" id="modal-stats"></div>
        <div class="modal-chart-wrap">
          <div class="modal-chart-label">24-Month History</div>
          <canvas id="modal-chart" style="position:absolute;top:42px;left:16px;right:16px;bottom:16px;width:calc(100% - 32px);height:calc(100% - 58px);"></canvas>
        </div>
        <div class="modal-signal loading" id="modal-signal">Generating AI signal…</div>
        <div class="modal-source" id="modal-source"></div>
      </div>
    </div>
  </div>

  <!-- Chart expand overlay -->
  <div id="chart-expand-overlay">
    <button id="chart-expand-close">✕</button>
    <div id="chart-expand-title"></div>
    <img id="chart-expand-img" alt="Expanded chart">
  </div>

  <script src="js/zipdata.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
